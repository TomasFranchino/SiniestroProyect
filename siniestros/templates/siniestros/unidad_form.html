<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva unidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container py-4" style="max-width: 760px;">
        <h1 class="h3 mb-4">Registrar unidad</h1>

        <form method="post" class="card card-body">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Guardar unidad</button>
                <a href="{% url 'siniestros:siniestro_list' %}" class="btn btn-outline-secondary">Volver al listado</a>
            </div>
        </form>
    </div>
</body>

</html>
